name: booruview-test

services:
  api:
    build:
      context: ./api/
      args:
        - COMMIT_HASH=$VITE_COMMIT_SHA
    #command: dlv debug --headless --listen=:12345 --continue --accept-multiclient cmd/server/main.go
    # security_opt: # IMPORTANT: only use when debugging
    #   - seccomp:unconfined
    environment:
      - "DATABASE_PATH=database/test.db"
      - "SECRET_KEY=test"
      - "VALKEY_ADDR=valkey:6379"
      - "GOOSE_DRIVER=sqlite3"
      - "GOOSE_DBSTRING=./database/sqlite.db"
      - "GOOSE_MIGRATION_DIR=./database/migrations"
    volumes:
      - ./api:/app
      - ./.gotestcache:/root/.cache/go-build
    depends_on:
      - valkey

  valkey:
    build:
      context: valkey

