when:
  - event: [pull_request, manual]

steps:
  - name: pre-commit
    image: python:3.14-alpine
    commands: |
      apk update && apk add git
      pip install pre-commit
      pre-commit run -a || cat /root/.cache/pre-commit/pre-commit.log

  - name: test api
    image: golang:1.25-alpine
    environment:
      SECRET_KEY: test
      VALKEY_ADDR: valkey:6379
    commands: |
      cd api
      export DATABASE_PATH=$(pwd)/database/test.db
      go run ./cmd/goose up
      go test ./...

services:
  - name: valkey
    image: valkey/valkey:8.1-alpine
