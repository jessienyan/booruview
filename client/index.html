<!doctype html>
<html lang="en-US">
    <head>
        <title>Booruview</title>

        <meta charset="UTF-8" />
        <meta

            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"

        <style>
            @import "./src/assets/_document.scss";
