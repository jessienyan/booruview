services:
  api:
    build:
      context: api
      args:
        - COMMIT_HASH=$VITE_COMMIT_SHA
    #command: dlv debug --headless --listen=:12345 --continue --accept-multiclient cmd/server/main.go
    # security_opt: # IMPORTANT: only use when debugging
    #   - seccomp:unconfined
    ports:
      - "8000:8000"
      - "12345:12345"
    environment:
      - "VALKEY_ADDR=valkey:6379"
      - "DATABASE_PATH=/app/database/sqlite.db"
    env_file:
      - ".env"
    volumes:
      - ./api:/app
      - ./client/dist/index.html:/index.html:ro
    depends_on:
      - client
      - valkey

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    env_file:
      - .env
    environment:
      - CADDY_HOST=:8080
    ports:
      - "8080:8080"
      - "9999:9999"
    volumes:
      - ./client/dist:/srv:ro   # Live client updates
      - ./logs/:/var/log/caddy/
      - caddy-data:/data
    depends_on:
      - api
      - client

  client:
    build:
      context: ./client/
    command: yarn build --watch --sourcemap
    environment:
      - NODE_ENV=development
      - VITE_DEV=1
      - VITE_COMMIT_SHA
      - VITE_LAST_COMMIT_DATE
    volumes:
      - ./client:/app

  valkey:
    build:
      context: valkey
    volumes:
      - dbdata:/data

volumes:
  caddy-data:
  dbdata:
